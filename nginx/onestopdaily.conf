# ─────────────────────────────────────────────────────────────────────────────
# Nginx Configuration for OneStopSolutions
# Domain:  www.onestopdaily.shop  (and root onestopdaily.shop)
# Server:  74.208.132.78
# Layout:
#   /             → React Dashboard (oss-dashboard)
#   /api/**       → Spring Boot backend (port 8080)
#   HTTPS         → Let's Encrypt SSL via Certbot
# ─────────────────────────────────────────────────────────────────────────────

# Redirect bare domain → www
server {
    listen 80;
    listen [::]:80;
    server_name onestopdaily.shop;
    return 301 http://www.onestopdaily.shop$request_uri;
}

# Main HTTP server (Certbot will upgrade this to HTTPS automatically)
server {
    listen 80;
    listen [::]:80;
    server_name www.onestopdaily.shop;

    # ── Dashboard (React SPA) ────────────────────────────────────────────────
    root /var/www/oss-dashboard;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Spring Boot API Proxy ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Allow large uploads (menu images etc.)
        client_max_body_size 20M;

        # Timeouts
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }

    # ── Proxy non-prefixed paths (for /items, /hello etc.) ──────────────────
    location ~ ^/(hello|items|sales)(/.*)?$ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header Referrer-Policy         strict-origin-when-cross-origin;

    # ── Cache static assets ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}

